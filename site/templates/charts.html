
<script src="{{ url_for('static', filename='js/plotly.min.js') }}"></script>

<div class="content-wrapper">
    <div class="dashboard-content">
        <div class="container-fluid">

    <!-- Gráficos full-width -->
    <div class="row ">
        {% for chart in charts %}
        <div class="col-12 mb-4 ">
            <div class="card border-0 shadow-sm h-100 ">
                <div class="card-header bg-light">
                    <h5 class="mb-0">{{ chart.title }}</h5>
                </div>
                <div class="card-body p-0 d-flex justify-content-center">
                    <div class="chart-container " style="width:80%;">
                        <div id="principal-chart-{{ loop.index }}" class="plotly-chart" style="min-height:520px;width:100%;"></div>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

        </div>
    </div>
</div>

<script>
    {% for chart in charts %}
    try {
        var chartString{{ loop.index }} = {{ chart.chart|tojson|safe }};
        var c{{ loop.index }} = JSON.parse(chartString{{ loop.index }});
        Plotly.newPlot('principal-chart-{{ loop.index }}', c{{ loop.index }}.data, c{{ loop.index }}.layout, {
            responsive:true, displaylogo:false
        });
        console.log("Gráfico {{ loop.index }} renderizado com sucesso");
    } catch (e) {
        console.error("Falha ao renderizar gráfico {{ loop.index }}:", e);
    }
    {% endfor %}
    
    // Event listener para resize (opcional)
    window.addEventListener('resize', function(){
        {% for chart in charts %}
        try {
            Plotly.Plots.resize(document.getElementById('principal-chart-{{ loop.index }}'));
        } catch (e) {
            console.error("Erro no resize do gráfico {{ loop.index }}:", e);
        }
        {% endfor %} 
        });
</script>
