{% extends "base.html" %}

{% block title %}Admin - Terminal Logs{% endblock %}

{% block content %}
<div class="d-flex justify-content-center mb-4">
    <button id="run-pipeline-btn" class="btn btn-success btn-lg">
        <i class="fas fa-play"></i> Run Full Pipeline
    </button>
    <div id="pipeline-status" class="ml-3 d-none">
        <div class="spinner-border spinner-border-sm text-primary" role="status">
            <span class="sr-only">Loading...</span>
        </div>
        <span id="status-text">Executando pipeline...</span>
    </div>
</div>
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-terminal"></i> Terminal Logs
                        <span class="badge badge-light ml-2">{{ log_count }}</span>
                    </h4>
                </div>
                <div class="card-body" style="background-color: #1a1a1a; color: #00ff00; font-family: 'Courier New', monospace;">
                    <div id="logs-container" style="max-height: 600px; overflow-y: auto; padding: 10px;">
                        {% for log in logs %}
                        <div class="log-entry mb-1">
                            <small class="text-muted">{{ log[:19] }}</small>
                            <span>{{ log[20:] }}</span>
                        </div>
                        {% endfor %}
                    </div>
                </div>
                <div class="card-footer">
                    <button id="refresh-btn" class="btn btn-primary btn-sm">
                        <i class="fas fa-sync-alt"></i> Atualizar
                    </button>
                    <button id="clear-btn" class="btn btn-warning btn-sm ml-2">
                        <i class="fas fa-trash"></i> Limpar Logs
                    </button>
                    <button id="auto-refresh-btn" class="btn btn-success btn-sm ml-2">
                        <i class="fas fa-play"></i> Auto Refresh (5s)
                    </button>
                    <a href='/powerbi'><button class="btn btn-dark btn-sm ml-2"> <i class="fas fa-home"></i> Voltar</button></a>
                    <div class="float-right">
                        <small class="text-muted">Última atualização: <span id="last-update">--:--:--</span></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const logsContainer = document.getElementById('logs-container');
    const refreshBtn = document.getElementById('refresh-btn');
    const clearBtn = document.getElementById('clear-btn');
    const autoRefreshBtn = document.getElementById('auto-refresh-btn');
    const lastUpdateSpan = document.getElementById('last-update');
    
    let autoRefreshInterval = null;
    
    function updateLogs() {
        fetch('/powerbi/admin/logs')
            .then(response => response.json())
            .then(data => {
                logsContainer.innerHTML = '';
                data.logs.forEach(log => {
                    const logDiv = document.createElement('div');
                    logDiv.className = 'log-entry mb-1';
                    logDiv.innerHTML = `
                        <small class="text-muted">${log.substring(0, 19)}</small>
                        <span>${log.substring(20)}</span>
                    `;
                    logsContainer.appendChild(logDiv);
                });
                
                // Scroll para o final
                logsContainer.scrollTop = logsContainer.scrollHeight;
                
                // Atualiza timestamp
                const now = new Date();
                lastUpdateSpan.textContent = now.toLocaleTimeString();
            })
            .catch(error => console.error('Erro ao atualizar logs:', error));
    }
    
    function clearLogs() {
        if (confirm('Tem certeza que deseja limpar todos os logs?')) {
            fetch('/powerbi/admin/logs', { method: 'DELETE' })
                .then(() => {
                    logsContainer.innerHTML = '<div class="text-center text-muted">Logs limpos</div>';
                })
                .catch(error => console.error('Erro ao limpar logs:', error));
        }
    }
    
    function toggleAutoRefresh() {
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
            autoRefreshBtn.innerHTML = '<i class="fas fa-play"></i> Auto Refresh (5s)';
            autoRefreshBtn.classList.remove('btn-danger');
            autoRefreshBtn.classList.add('btn-success');
        } else {
            autoRefreshInterval = setInterval(updateLogs, 5000);
            autoRefreshBtn.innerHTML = '<i class="fas fa-stop"></i> Parar Auto Refresh';
            autoRefreshBtn.classList.remove('btn-success');
            autoRefreshBtn.classList.add('btn-danger');
        }
    }
    
    refreshBtn.addEventListener('click', updateLogs);
    clearBtn.addEventListener('click', clearLogs);
    autoRefreshBtn.addEventListener('click', toggleAutoRefresh);
    
    // Scroll inicial para o final
    logsContainer.scrollTop = logsContainer.scrollHeight;
});
// Função para executar pipeline
function runPipeline() {
        const btn = document.getElementById('run-pipeline-btn');
        const statusDiv = document.getElementById('pipeline-status');
        const statusText = document.getElementById('status-text');
        
        // Desabilita botão
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Executando...';
        
        // Mostra status
        statusDiv.classList.remove('d-none');
        statusText.textContent = 'Iniciando pipeline...';
        
        fetch('/powerbi/admin/run-pipeline', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'started') {
                statusText.textContent = 'Pipeline iniciada! Verificando progresso...';
                checkPipelineStatus();
            } else {
                throw new Error(data.message);
            }
        })
        .catch(error => {
            console.error('Erro:', error);
            statusText.textContent = `Erro: ${error.message}`;
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-play"></i> Run Full Pipeline';
        });
    }
    
    function checkPipelineStatus() {
        const btn = document.getElementById('run-pipeline-btn');
        const statusText = document.getElementById('status-text');
        
        fetch('/powerbi/admin/pipeline-status')
        .then(response => response.json())
        .then(data => {
            if (data.running) {
                // Ainda executando, continua verificando
                const statusMessages = {
                    'running': 'Executando pipeline...',
                    'scraping': 'Coletando dados...',
                    'updating_vbp': 'Atualizando VBP...',
                    'updating_safras': 'Atualizando Safras...',
                    'updating_dolar': 'Atualizando Dólar...',
                    'updating_agrotoxicos': 'Atualizando Agrotóxicos...',
                    'updating_credito_rural': 'Atualizando Crédito Rural...',
                    'updating_poda': 'Atualizando Poda...',
                    'updating_precos': 'Atualizando Preços...',
                    'updating_pib': 'Atualizando PIB Agro...'
                };
                
                statusText.textContent = statusMessages[data.status] || 'Executando...';
                setTimeout(checkPipelineStatus, 2000); // Verifica novamente em 2 segundos
            } else {
                // Finalizou
                if (data.status === 'completed') {
                    statusText.textContent = '✅ Pipeline concluída com sucesso!';
                    btn.innerHTML = '<i class="fas fa-check"></i> Concluído';
                    btn.classList.remove('btn-success');
                    btn.classList.add('btn-success');
                } else if (data.status.startsWith('error:')) {
                    statusText.textContent = `❌ Erro: ${data.status.substring(6)}`;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Erro - Tentar Novamente';
                    btn.classList.remove('btn-success');
                    btn.classList.add('btn-danger');
                }
                
                // Reabilita botão após 5 segundos
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-play"></i> Run Full Pipeline';
                    btn.classList.remove('btn-danger');
                    btn.classList.add('btn-success');
                }, 5000);
            }
        })
        .catch(error => {
            console.error('Erro ao verificar status:', error);
            statusText.textContent = 'Erro ao verificar status';
        });
    }
    
    // Adiciona event listener ao botão
    document.getElementById('run-pipeline-btn').addEventListener('click', runPipeline);
</script>

<style>
.log-entry {
    font-size: 12px;
    line-height: 1.3;
}

.log-entry small {
    margin-right: 10px;
    color: #888 !important;
}

#logs-container {
    border: 1px solid #333;
    border-radius: 4px;
    background-color: #000;
}
</style>
{% endblock %}
